services:
  postgres:
    image: postgres:16
    container_name: impactbridge-postgres-v2
    restart: always
    environment:
      POSTGRES_USER: ib_user
      POSTGRES_PASSWORD: ib_password_123
      POSTGRES_DB: ib_dev
    ports:
      - "5433:5432"
    volumes:
      - impactbridge_pgdata_v2:/var/lib/postgresql/data

volumes:
  impactbridge_pgdata_v2:
